<!-- Trigger Button -->
<div class="relative w-full">
    <button
        type="button"
        (click)="openPicker()"
        class="w-full flex items-center justify-between gap-2 px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-sm font-semibold text-slate-700 dark:text-slate-200 hover:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all shadow-sm"
    >
        <div class="flex items-center gap-2">
            <mat-icon class="icon-size-5 text-indigo-500">schedule</mat-icon>
            <span class="text-sm font-bold">{{ displayValue }}</span>
        </div>
        <span class="text-xs text-slate-400">{{ label }}</span>
    </button>
</div>

<!-- Backdrop -->
<div
    *ngIf="isOpen"
    class="fixed inset-0 z-[9000] bg-black/40 backdrop-blur-sm flex items-end sm:items-center justify-center"
    (click)="onBackdropClick()"
>
    <!-- Picker Modal Card -->
    <div
        class="relative bg-white dark:bg-slate-900 w-full sm:max-w-xs rounded-t-3xl sm:rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden animate-slide-up"
        (click)="$event.stopPropagation()"
    >
        <!-- Header -->
        <div class="flex items-center justify-between px-5 pt-5 pb-2">
            <span class="text-base font-black text-slate-800 dark:text-slate-100 flex items-center gap-2">
                <mat-icon class="icon-size-5 text-indigo-500">schedule</mat-icon>
                Seleccionar Hora
            </span>
            <button type="button" (click)="closePicker()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
                <mat-icon class="icon-size-5">close</mat-icon>
            </button>
        </div>

        <!-- Drum Roll -->
        <div class="relative flex items-center justify-center px-6 pb-2 mt-2" style="height: 220px;">

            <!-- Selection Highlight Band -->
            <div class="absolute left-6 right-6 pointer-events-none z-10" style="top: 50%; transform: translateY(-50%); height: 44px;">
                <div class="w-full h-full rounded-xl bg-indigo-50 dark:bg-indigo-950/50 border border-indigo-200 dark:border-indigo-700"></div>
            </div>

            <!-- Fade overlays top -->
            <div class="absolute left-6 right-6 pointer-events-none z-20 top-0" style="height: 88px; background: linear-gradient(to bottom, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);"></div>
            <!-- Fade overlays bottom -->
            <div class="absolute left-6 right-6 pointer-events-none z-20 bottom-0" style="height: 88px; background: linear-gradient(to top, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);"></div>

            <!-- Dark mode fades -->
            <div class="dark:block hidden absolute left-6 right-6 pointer-events-none z-20 top-0" style="height: 88px; background: linear-gradient(to bottom, rgba(15,23,42,1) 0%, rgba(15,23,42,0) 100%);"></div>
            <div class="dark:block hidden absolute left-6 right-6 pointer-events-none z-20 bottom-0" style="height: 88px; background: linear-gradient(to top, rgba(15,23,42,1) 0%, rgba(15,23,42,0) 100%);"></div>

            <!-- Hours Column -->
            <div class="flex-1 h-full overflow-hidden relative">
                <div
                    #hoursList
                    class="h-full overflow-y-scroll scroll-smooth snap-y snap-mandatory scrollbar-hide"
                    (scroll)="onHourScroll($event)"
                    style="scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; -ms-overflow-style: none;"
                >
                    <!-- Top padding -->
                    <div style="height: 88px; flex-shrink: 0;"></div>

                    <div
                        *ngFor="let h of hours"
                        class="flex items-center justify-center cursor-pointer select-none transition-all duration-150"
                        [class.text-indigo-700]="selectedHour === h"
                        [class.dark:text-indigo-400]="selectedHour === h"
                        [class.font-black]="selectedHour === h"
                        [class.text-2xl]="selectedHour === h"
                        [class.text-slate-300]="selectedHour !== h"
                        [class.dark:text-slate-600]="selectedHour !== h"
                        [class.text-base]="selectedHour !== h"
                        [class.font-medium]="selectedHour !== h"
                        style="height: 44px; scroll-snap-align: start; flex-shrink: 0;"
                        (click)="selectHour(h)"
                    >
                        {{ pad(h) }}
                    </div>

                    <!-- Bottom padding -->
                    <div style="height: 88px; flex-shrink: 0;"></div>
                </div>
            </div>

            <!-- Separator -->
            <div class="flex-shrink-0 flex items-center justify-center" style="width: 24px;">
                <span class="text-2xl font-black text-indigo-600 dark:text-indigo-400 leading-none">:</span>
            </div>

            <!-- Minutes Column -->
            <div class="flex-1 h-full overflow-hidden relative">
                <div
                    #minutesList
                    class="h-full overflow-y-scroll scroll-smooth snap-y snap-mandatory scrollbar-hide"
                    (scroll)="onMinuteScroll($event)"
                    style="scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; -ms-overflow-style: none;"
                >
                    <!-- Top padding -->
                    <div style="height: 88px; flex-shrink: 0;"></div>

                    <div
                        *ngFor="let m of minutes"
                        class="flex items-center justify-center cursor-pointer select-none transition-all duration-150"
                        [class.text-indigo-700]="selectedMinute === m"
                        [class.dark:text-indigo-400]="selectedMinute === m"
                        [class.font-black]="selectedMinute === m"
                        [class.text-2xl]="selectedMinute === m"
                        [class.text-slate-300]="selectedMinute !== m"
                        [class.dark:text-slate-600]="selectedMinute !== m"
                        [class.text-base]="selectedMinute !== m"
                        [class.font-medium]="selectedMinute !== m"
                        style="height: 44px; scroll-snap-align: start; flex-shrink: 0;"
                        (click)="selectMinute(m)"
                    >
                        {{ pad(m) }}
                    </div>

                    <!-- Bottom padding -->
                    <div style="height: 88px; flex-shrink: 0;"></div>
                </div>
            </div>
        </div>

        <!-- Preview Live -->
        <div class="text-center pb-2">
            <span class="text-4xl font-black text-slate-800 dark:text-slate-100 tracking-tight tabular-nums">
                {{ pad(selectedHour) }}<span class="text-indigo-500 animate-pulse mx-0.5">:</span>{{ pad(selectedMinute) }}
            </span>
            <p class="text-xs text-slate-400 mt-1">{{ selectedHour < 12 ? 'AM' : 'PM' }} · {{ selectedHour >= 12 ? selectedHour - 12 || 12 : selectedHour || 12 }}:{{ pad(selectedMinute) }} {{ selectedHour < 12 ? 'AM' : 'PM' }}</p>
        </div>

        <!-- Confirm -->
        <div class="px-5 pb-5 pt-3">
            <button
                type="button"
                (click)="confirmSelection()"
                class="w-full py-3 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-extrabold tracking-wide shadow-lg shadow-indigo-200 dark:shadow-indigo-950 transition-all active:scale-95"
            >
                Confirmar Hora
            </button>
        </div>
    </div>
</div>
