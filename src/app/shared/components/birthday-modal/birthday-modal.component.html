<div class="birthday-container relative flex items-center justify-center">
    
    <!-- Main Premium Card -->
    <div class="premium-card relative z-10 w-full max-w-xl mx-4">
        
        <!-- ⚡ Lightweight Performance-Optimized Electric Border -->
        <div class="fast-electric-border"></div>

        
        <!-- Animated Background Blur Blobs -->
        <div class="blobs">
            <div class="blob b1"></div>
            <div class="blob b2"></div>
        </div>

        <div class="content-wrapper relative z-20 w-full p-8 md:p-14 flex flex-col items-center text-center">
            
            <!-- Close Button -->
            <button mat-icon-button (click)="close()" class="absolute top-4 right-4 text-white/40 hover:text-white transition-all duration-300">
                <mat-icon svgIcon="heroicons_outline:x-mark"></mat-icon>
            </button>

            <!-- Hero Section -->
            <div class="hero-visual mb-8 relative">
                <div class="aura"></div>
                <div class="floating-assets">
                    <span class="asset a1">🎈</span>
                    <span class="asset a2">✨</span>
                    <span class="asset a3">🎁</span>
                </div>
                <div class="icon-frame">
                    <mat-icon class="hero-icon" svgIcon="heroicons_outline:cake"></mat-icon>
                </div>
            </div>

            <!-- Typography -->
            <div class="branding mb-10">
                <h1 class="main-title">¡Feliz Cumpleaños!</h1>
                <div class="gradient-bar mx-auto"></div>
                <p class="main-message mt-6">
                    Es un día muy especial para todos nosotros, porque hoy celebramos tu vida.
                </p>
            </div>

            <!-- Interactive Quote -->
            <div class="quote-card group" (click)="celebrate()">
                <div class="quote-icon">“</div>
                <p class="quote-text italic">
                    {{ randomPhrase }}
                </p>
                <div class="interaction-hint mt-6 flex items-center justify-center space-x-3 opacity-40">
                    <span class="pulse-dot"></span>
                    <span class="hint-label">Toca para celebrar de nuevo</span>
                </div>
            </div>

            <!-- CTA Button -->
            <button mat-flat-button class="cta-action mt-12 w-full sm:w-auto" (click)="celebrate()">
                <span class="btn-label">Sigue Brillando</span>
            </button>
        </div>
    </div>
</div>
