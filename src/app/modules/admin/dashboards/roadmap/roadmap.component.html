<div class="flex flex-col flex-auto min-w-0 h-full overflow-hidden bg-white dark:bg-slate-900">
    <!-- Header with Switch and Title -->
    <div class="relative flex-none flex flex-col p-6 sm:p-10 z-10">
        <div class="flex items-center justify-between w-full mb-6">
            <div class="flex items-center">
                <!-- JR Logo with Arc -->
                <div class="relative flex items-center justify-center w-20 h-20 mr-6">
                    <svg viewBox="0 0 100 100" class="absolute inset-0 w-full h-full overflow-visible">
                        <circle cx="50" cy="50" r="40" fill="none" stroke="#1e3a8a" stroke-width="4" />
                        <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#16a34a" stroke-width="3" stroke-linecap="round" transform="rotate(-45 50 50)" />
                    </svg>
                    <span class="text-3xl font-black text-blue-900 z-10">JR</span>
                </div>
                <div class="h-12 w-0.5 bg-slate-300 mx-6"></div>
                <h1 class="text-4xl sm:text-6xl font-black tracking-tighter text-slate-300 uppercase leading-none" style="letter-spacing: -2px;">ROADMAP 2026</h1>
            </div>
            
            <mat-button-toggle-group [(ngModel)]="viewMode" appearance="standard" class="border-none bg-slate-100 dark:bg-slate-800 rounded-xl p-1">
                <mat-button-toggle value="interactive" class="rounded-lg border-none px-4">Interactivo</mat-button-toggle>
                <mat-button-toggle value="image" class="rounded-lg border-none px-4">Imagen</mat-button-toggle>
            </mat-button-toggle-group>
        </div>

        <!-- Legend (Inline for better space) -->
        <div class="flex flex-wrap gap-x-6 gap-y-2">
            <div *ngFor="let cat of categories" class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full" [style.background-color]="cat.color"></div>
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-tight">{{cat.name}}</span>
            </div>
        </div>
    </div>

    <!-- Content Area -->
    <div class="flex-auto overflow-hidden relative bg-slate-50 dark:bg-slate-950">
        
        <!-- View: Image -->
        <div *ngIf="viewMode === 'image'" class="w-full h-full p-4 sm:p-10 flex items-center justify-center overflow-auto">
            <img src="images/pages/road-map2.png" alt="Roadmap 2026" class="max-w-full max-h-full object-contain shadow-2xl rounded-2xl">
        </div>

        <!-- View: Interactive SVG -->
        <div *ngIf="viewMode === 'interactive'" 
             class="w-full h-full relative overflow-hidden flex flex-col items-center cursor-move"
             (mousedown)="onMouseDown($event)"
             (mousemove)="onMouseMove($event)"
             (mouseup)="onMouseUp()"
             (mouseleave)="onMouseUp()"
             (wheel)="onWheel($event)"
             (touchstart)="onTouchStart($event)"
             (touchmove)="onTouchMove($event)"
             (touchend)="onTouchEnd()">
            
            <!-- Zoom Controls (Bottom Right) -->
            <div class="absolute bottom-6 right-6 flex flex-col gap-2 z-50">
                <button mat-mini-fab color="white" (click)="zoomIn()" matTooltip="Acercar">
                    <mat-icon [svgIcon]="'heroicons_outline:plus'"></mat-icon>
                </button>
                <button mat-mini-fab color="white" (click)="zoomOut()" matTooltip="Alejar">
                    <mat-icon [svgIcon]="'heroicons_outline:minus'"></mat-icon>
                </button>
                <button mat-mini-fab color="white" (click)="resetZoom()" matTooltip="Restablecer">
                    <mat-icon [svgIcon]="'heroicons_outline:arrow-path'"></mat-icon>
                </button>
            </div>

            <!-- Green Wave Decoration (Static background) -->
            <div class="absolute bottom-0 left-0 w-full pointer-events-none opacity-10">
                <svg viewBox="0 0 1440 320" class="w-full h-auto">
                    <path fill="#16a34a" d="M0,224L120,213.3C240,203,480,181,720,186.7C960,192,1200,224,1320,240L1440,256L1440,320L1320,320C1200,320,960,320,720,320C480,320,240,320,120,320L0,320Z"></path>
                </svg>
            </div>

            <!-- Roadmap SVG Wrapper (Transformed) -->
            <div class="w-full max-w-[1400px] overflow-visible px-10 py-10 relative z-10 transition-transform duration-75 ease-out"
                 [style.transform]="'translate(' + panX + 'px,' + panY + 'px) scale(' + zoom + ')'"
                 style="transform-origin: center center;">
                <!-- Background SVG for Roadmap -->
                <svg viewBox="0 0 1450 1100" class="w-full h-auto drop-shadow-2xl">
                    <defs>
                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="3" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>

                    <!-- Main Path -->
                    <path id="roadmapPath" 
                          d="M 80,220 L 1200,220 
                             C 1450,220 1450,550 1200,550 
                             L 300,550 
                             C 50,550 50,880 200,880 
                             L 1250,880"
                          fill="none" stroke="#e2e8f0" stroke-width="40" stroke-linecap="round" />
                    
                    <!-- Progress Path (Dynamic) -->
                    <path id="progressPath" 
                          d="M 80,220 L 1200,220 
                             C 1450,220 1450,550 1200,550 
                             L 300,550 
                             C 50,550 50,880 200,880 
                             L 1250,880"
                          fill="none" stroke="#10b981" stroke-width="40" stroke-linecap="round"
                          [attr.stroke-dasharray]="100"
                          [attr.stroke-dashoffset]="100 - currentProgress"
                          pathLength="100"
                          class="transition-all duration-1000 ease-in-out" />

                    <!-- Milestones -->
                    <g *ngFor="let m of milestones; let mi = index" class="milestone-group">
                        <!-- Main Milestone Circle (Solid Black) -->
                        <circle [attr.cx]="m.x" [attr.cy]="m.y" r="22" 
                                fill="#0f172a" 
                                stroke="white" stroke-width="4"
                                class="milestone-node drop-shadow-lg" />
                        
                        <!-- Month Label -->
                        <text [attr.x]="m.x" [attr.y]="m.y - 45" 
                              text-anchor="middle"
                              class="text-xl font-black fill-slate-900 dark:fill-white uppercase tracking-tight">{{m.month}}</text>

                        <!-- Events -->
                        <g *ngFor="let ev of m.events">
                            <!-- Thin connector -->
                            <line [attr.x1]="ev.x" [attr.y1]="m.y"
                                  [attr.x2]="ev.x" [attr.y2]="ev.y"
                                  stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3" />

                            <!-- Event Dot with Hover Effect -->
                            <circle [attr.cx]="ev.x" 
                                    [attr.cy]="ev.y" 
                                    r="11" [attr.fill]="ev.cat" 
                                    class="event-node cursor-pointer filter drop-shadow-md transition-all duration-300"
                                    [style.color]="ev.cat"
                                    [matTooltip]="ev.title" />

                            <!-- Label -->
                            <text [attr.x]="ev.x" 
                                  [attr.y]="ev.y < m.y ? ev.y - 30 : ev.y + 40"
                                  [attr.text-anchor]="'middle'"
                                  [attr.fill]="ev.cat"
                                  class="text-[10px] font-bold uppercase pointer-events-none tracking-tight">
                                <tspan [attr.x]="ev.x" dy="0">{{ev.title.split(' ')[0]}}</tspan>
                                <tspan [attr.x]="ev.x" dy="12" *ngIf="ev.title.split(' ').length > 1">{{ev.title.split(' ').slice(1).join(' ')}}</tspan>
                            </text>
                        </g>
                    </g>
                </svg>
            </div>
        </div>
    </div>
</div>
