<div class="flex flex-col flex-auto min-w-0 overflow-hidden bg-white dark:bg-[#020617] font-sans">

    <!-- Header: Ultra Slim & Modern -->
    <div class="flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between px-6 py-4 bg-white dark:bg-slate-900 border-b dark:border-white/5 z-20">
        <div class="flex items-center space-x-4">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <mat-icon class="icon-size-5 text-white" svgIcon="heroicons_outline:bolt"></mat-icon>
            </div>
            <div>
                <h2 class="text-xl font-black text-slate-800 dark:text-white tracking-tight uppercase leading-none">
                    Pulse <span class="text-indigo-600">Monitor</span>
                </h2>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1 italic">Real-time Telemetry v4.8</p>
            </div>
        </div>
        
        <div class="flex items-center mt-4 sm:mt-0 space-x-3">
            <div class="hidden md:flex items-center px-2 py-1 rounded-lg bg-green-500/10 border border-green-500/20 mr-2">
                <div class="h-1.5 w-1.5 rounded-full bg-green-500 animate-pulse mr-2"></div>
                <span class="text-[8px] font-black text-green-600 uppercase">Live Stream</span>
            </div>
            <button mat-button color="warn" (click)="clearFeed()" class="text-[10px] font-black uppercase tracking-widest hover:bg-rose-50 dark:hover:bg-rose-500/10 rounded-lg px-4">
                <mat-icon class="icon-size-4 mr-2" svgIcon="heroicons_outline:trash"></mat-icon>
                Limpiar
            </button>
        </div>
    </div>

    <!-- Main Content: Slim Stream -->
    <div class="flex-auto overflow-y-auto custom-scrollbar p-4 sm:p-6 lg:p-8">
        
        <div class="max-w-6xl mx-auto space-y-3" [@listAnimation]="activities.length">
            
            <ng-container *ngFor="let activity of activities; trackBy: trackByFn">
                <div class="group relative flex flex-col md:flex-row md:items-center bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/5 rounded-2xl p-3 sm:p-4 hover:shadow-lg hover:border-indigo-500/30 transition-all duration-300">
                    
                    <!-- Left Accent -->
                    <div class="absolute left-0 top-3 bottom-3 w-1 rounded-r-full bg-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>

                    <!-- 1. User Info (Always visible, compact) -->
                    <div class="flex items-center space-x-3 w-full md:w-64 flex-shrink-0">
                        <div class="relative flex-shrink-0">
                            <div class="w-10 h-10 rounded-full border-2 border-white dark:border-slate-800 shadow-sm overflow-hidden">
                                <img *ngIf="activity.avatar" [src]="activity.avatar" class="w-full h-full object-cover">
                                <div *ngIf="!activity.avatar" class="w-full h-full flex items-center justify-center text-white font-black text-[10px]" 
                                     [style.background-color]="getUserColor(activity.nombreUsuario)">
                                    {{ getUserInitials(activity.nombreUsuario) }}
                                </div>
                            </div>
                            <div class="absolute -bottom-0.5 -right-0.5 w-4 h-4 rounded-full bg-white dark:bg-slate-800 border flex items-center justify-center shadow-sm">
                                <mat-icon class="icon-size-2.5 text-slate-400" [svgIcon]="activity.dispositivo === 'Móvil' ? 'heroicons_outline:device-phone-mobile' : 'heroicons_outline:computer-desktop'"></mat-icon>
                            </div>
                        </div>
                        <div class="min-w-0">
                            <h4 class="text-xs font-black text-slate-800 dark:text-white truncate leading-none mb-1">
                                {{ activity.nombreUsuario }}
                            </h4>
                            <div class="flex items-center space-x-2">
                                <!-- MODULO TRADUCIDO -->
                                <span class="text-[10px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-widest whitespace-nowrap">
                                    {{ getFriendlyModule(activity) }}
                                </span>
                                <span class="text-[9px] font-bold text-slate-300 dark:text-slate-600 font-mono">{{ activity.fecha | date: 'HH:mm:ss' }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- 2. Action Area (Fluid) -->
                    <div class="flex-auto mt-3 md:mt-0 md:px-6 border-t md:border-t-0 md:border-l border-slate-100 dark:border-white/5 pt-3 md:pt-0">
                        <p class="text-[13px] font-bold text-slate-600 dark:text-slate-300 leading-tight">
                            {{ activity.accion }}
                        </p>
                        <div class="flex items-center mt-1 space-x-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                            <div class="flex items-center text-[9px] font-mono text-slate-400 dark:text-slate-500 tracking-tighter truncate max-w-xs sm:max-w-md">
                                <mat-icon class="icon-size-3 mr-1" svgIcon="heroicons_outline:link"></mat-icon>
                                {{ activity.urlPath }}
                            </div>
                        </div>
                    </div>

                    <!-- 3. Navigation (End) -->
                    <div class="flex items-center justify-end mt-3 md:mt-0 md:ml-4">
                        <span class="hidden lg:block text-[8px] font-black text-slate-300 dark:text-slate-700 uppercase tracking-widest mr-4">LOG #{{ activity.idLog }}</span>
                        <!-- ICONO CORREGIDO -->
                        <button (click)="goToModule(activity.urlPath)" 
                                class="flex items-center justify-center w-9 h-9 rounded-xl bg-slate-100 dark:bg-white/5 text-slate-400 hover:bg-indigo-600 hover:text-white transition-all shadow-sm">
                            <mat-icon class="icon-size-5" svgIcon="heroicons_outline:chevron-right"></mat-icon>
                        </button>
                    </div>
                </div>
            </ng-container>

            <!-- Empty State -->
            <div *ngIf="activities.length === 0" class="flex flex-col items-center justify-center py-20 opacity-20">
                <mat-icon class="icon-size-12 mb-4" svgIcon="heroicons_outline:wifi"></mat-icon>
                <p class="text-[10px] font-black uppercase tracking-[0.4em]">Listening...</p>
            </div>
        </div>
    </div>
</div>
